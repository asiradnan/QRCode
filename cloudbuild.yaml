steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/github.com/asiradnan/qrcode:$COMMIT_SHA'
      - '-f'
      - 'dockerfile'
      - '.'

  # 2. Push the container image to the registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/github.com/asiradnan/qrcode:$COMMIT_SHA'

  # 3. Deploy the container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'qrcode'
      - '--image'
      - 'gcr.io/$PROJECT_ID/github.com/asiradnan/qrcode:$COMMIT_SHA'
      - '--region'
      - 'asia-northeast1'

images:
  - 'gcr.io/$PROJECT_ID/github.com/asiradnan/qrcode:$COMMIT_SHA'
